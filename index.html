<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Hamburger Menu Animation</title>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <div class="icon">
           <i class="bx bx-menu open"></i>
           <i class="bx bx-x close"></i>
        </div>
        <div class="icon line">
           <i class="bx bx-menu open"></i>
           <i class="bx bx-list-ul close"></i>
        </div>
        <div class="icon">
           <i class="bx bx-grid open"></i>
           <i class="bx bx-x close"></i>
        </div>
        <div class="icon line">
           <i class="bx bx-menu open"></i>
           <i class="bx bx-menu-right"></i>
        </div>
        <div class="icon">
           <i class="bx bx-menu open"></i>
           <i class="bx bx-caret-big-right close"></i>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
